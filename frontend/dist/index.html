const api=async(path,opts={})=>{const r=await fetch('/api'+path,{headers:{'Content-Type':'application/json',...opts.headers},...opts});if(!r.ok){const e=await r.json().catch(()=>({detail:r.statusText}));throw new Error(e.detail||'Erro')}return r.json()};

// ====== TOAST ======
const ToastCtx=createContext();
function ToastProvider({children}){
  const[toasts,setToasts]=useState([]);
  const add=(type,message)=>{const id=Date.now().toString(36);setToasts(t=>[...t,{id,type,message}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000)};
  return <ToastCtx.Provider value={{toasts,add}}>{children}

        <button onClick={()=>setToasts(ts=>ts.filter(x=>x.id!==t.id))} className="text-lg leading-none">&times;</button>
      </div>)}
    </div>
  </ToastCtx.Provider>
}

// ====== AI VALIDATION ======
function useAIValidation(){
  const[results,setResults]=useState({});
  const[loading,setLoading]=useState({});
  const validate=async(fk,value,rule,fieldName)=>{
    if(!rule||!value){setResults(r=>({...r,[fk]:null}));return}
    setLoading(l=>({...l,[fk]:true}));
    const model=localStorage.getItem('dbx-ai-model')||'';
    try{const res=await api('/validate',{method:'POST',body:JSON.stringify({value,rule,field_name:fieldName,model})});setResults(r=>({...r,[fk]:res}))}
    catch{setResults(r=>({...r,[fk]:{valid:true,message:'Err'}}))}
    finally{setLoading(l=>({...l,[fk]:false}))}
  };
  const clear=()=>{setResults({});setLoading({})};
  return{results,loading,validate,clear};
}
function ValidationBadge({result,loading}){
  const{t}=useI18n();
  if(loading)return <span className="inline-flex items-center gap-1 text-xs text-gray-400"><span className="w-3 h-3 border-2 border-gray-300 border-t-transparent rounded-full animate-spin"/>{t.validating}</span>;
  if(!result)return null;
  if(result.valid)return <span className="inline-flex items-center gap-1 text-xs text-emerald-600">&#10003; {t.validLabel}{result._reused&&<span className="text-gray-400"> ({t.cached})</span>}</span>;
  return <span className="inline-flex items-center gap-1 text-xs text-rose-600">&#10007; {result.message||t.invalid}{result._reused&&<span className="text-gray-400"> ({t.cached})</span>}</span>;
}

// ====== CSV PARSER ======
function parseCSV(text){
  const seps=[';',',','|','\t'];
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return{headers:[],rows:[]};
  let bestSep=',',bestScore=0;
  for(const sep of seps){const counts=lines.slice(0,5).map(l=>l.split(sep).length);const ok=counts.every(c=>c===counts[0])&&counts[0]>1;const sc=ok?counts[0]*10:counts[0];if(sc>bestScore){bestScore=sc;bestSep=sep}}
  const headers=lines[0].split(bestSep).map(h=>h.trim().replace(/^["']|["']$/g,''));
  const rows=[];
  for(let i=1;i<lines.length;i++){const vals=lines[i].split(bestSep).map(v=>v.trim().replace(/^["']|["']$/g,''));const row={};headers.forEach((h,j)=>{row[h]=vals[j]||''});rows.push(row)}
  return{headers,rows}
}

// ====== VIEW ======
function CrudView({id,onNav}){
  const{t}=useI18n();const{add}=useToast();const aiVal=useAIValidation();
  const[crud,setCrud]=useState(null);const[data,setData]=useState(null);const[search,setSearch]=useState('');const[searchInput,setSearchInput]=useState('');
  const[page,setPage]=useState(1);const[sortBy,setSortBy]=useState('_created_at');const[sortDir,setSortDir]=useState('desc');
  const[adding,setAdding]=useState(false);const[editId,setEditId]=useState(null);const[form,setForm]=useState({});
  const[delId,setDelId]=useState(null);const[selected,setSelected]=useState(new Set());const[batchDel,setBatchDel]=useState(false);
  useEffect(()=>{api(`/cruds/${id}`).then(setCrud).catch(()=>add('error',t.errNotFound))},[id]);
  const loadData=useCallback(()=>{if(!crud)return;api(`/cruds/${id}/data?search=${encodeURIComponent(search)}&page=${page}&sort_by=${sortBy}&sort_dir=${sortDir}`).then(setData).catch(()=>add('error',t.errLoad))},[crud,search,page,sortBy,sortDir]);
  useEffect(()=>{loadData()},[loadData]);
  useEffect(()=>{const tm=setTimeout(()=>{setSearch(searchInput);setPage(1)},300);return()=>clearTimeout(tm)},[searchInput]);
  const cols=crud?.columns||[];const rows=data?.data||[];
  const startAdd=()=>{setAdding(true);setEditId(null);setForm({});aiVal.clear()};
  const startEdit=row=>{setEditId(row._id);setAdding(false);const f={};cols.forEach(c=>{f[c.db_column]=row[c.db_column]!=null?String(row[c.db_column]):''});setForm(f);aiVal.clear()};
  const cancel=()=>{setAdding(false);setEditId(null);setForm({});aiVal.clear()};
  const saveAdd=async()=>{try{await api(`/cruds/${id}/data`,{method:'POST',body:JSON.stringify({data:form})});add('success',t.added);cancel();loadData()}catch(e){add('error',e.message)}};
  const saveEdit=async()=>{try{await api(`/cruds/${id}/data/${editId}`,{method:'PUT',body:JSON.stringify({data:form})});add('success',t.updated);cancel();loadData()}catch(e){add('error',e.message)}};
  const handleDel=async()=>{try{await api(`/cruds/${id}/data/${delId}`,{method:'DELETE'});add('success',t.deleted);loadData()}catch{add('error','Err')}setDelId(null)};
  const handleBatchDel=async()=>{try{await api(`/cruds/${id}/data/batch-delete`,{method:'POST',body:JSON.stringify(Array.from(selected))});add('success',`${selected.size} ${t.deleted}`);setSelected(new Set());loadData()}catch{add('error','Err')}setBatchDel(false)};
  const handleExport=async()=>{try{const exp=await api(`/cruds/${id}/export`);const ws=XLSX.utils.json_to_sheet(exp.data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,crud?.name||'Data');XLSX.writeFile(wb,`${crud?.name||'export'}.xlsx`);add('success',t.exported)}catch{add('error',t.errExport)}};
  const toggleSort=col=>{if(sortBy===col)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortBy(col);setSortDir('asc')}};
  const toggleSel=rid=>{setSelected(prev=>{const n=new Set(prev);n.has(rid)?n.delete(rid):n.add(rid);return n})};
  const handleFieldChange=(col,val)=>{setForm({...form,[col.db_column]:val});if(col.validation_rule&&val){clearTimeout(window['_aiv_'+col.db_column]);window['_aiv_'+col.db_column]=setTimeout(()=>{aiVal.validate(col.db_column,val,col.validation_rule,col.name)},800)}};
  const renderInput=col=>{const v=form[col.db_column]||'';
    const inp=(()=>{if(col.data_type==='boolean')return<select value={v} onChange={e=>handleFieldChange(col,e.target.value)} className="w-full px-2 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm"><option value="">--</option><option value="true">{t.yes}</option><option value="false">{t.no}</option></select>;
      const type=col.data_type==='date'?'date':col.data_type==='datetime'?'datetime-local':col.data_type==='integer'||col.data_type==='decimal'?'number':'text';
      return<input type={type} step={col.data_type==='decimal'?'0.01':undefined} value={v} onChange={e=>handleFieldChange(col,e.target.value)} placeholder={col.name} className="w-full px-2 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-300"/>})();
    return <div>{inp}{col.validation_rule&&<ValidationBadge result={aiVal.results[col.db_column]} loading={aiVal.loading[col.db_column]}/>}</div>};
  if(!crud)return<div className="flex items-center justify-center h-64"><div className="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"/></div>;
  return <div className="animate-fade-in space-y-4">
    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div className="flex items-center gap-4"><button onClick={()=>onNav('home')} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-xl">&larr;</button><div className="w-12 h-12 rounded-2xl flex items-center justify-center text-white font-bold" style={{backgroundColor:crud.color}}>{crud.name.substring(0,2).toUpperCase()}</div><div><h1 className="text-2xl font-bold">{crud.name}</h1>{crud.description&&<p className="text-gray-500 dark:text-gray-400 text-sm">{crud.description}</p>}</div></div>
      <div className="flex items-center gap-2">
        <button onClick={()=>onNav('import',id)} className="px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-700 text-sm hover:bg-gray-50 dark:hover:bg-gray-800">{t.import_}</button>
        <button onClick={handleExport} className="px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-700 text-sm hover:bg-gray-50 dark:hover:bg-gray-800">{t.export_}</button>
        <button onClick={()=>onNav('edit',id)} className="px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-700 text-sm hover:bg-gray-50 dark:hover:bg-gray-800">{t.edit}</button>
      </div></div>
    <div className="flex items-center gap-3">
      <div className="relative flex-1"><span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">&#128269;</span><input value={searchInput} onChange={e=>setSearchInput(e.target.value)} placeholder={t.searchAll} className="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/></div>
      <button onClick={startAdd} className="px-4 py-2.5 accent-bg text-white rounded-xl text-sm font-medium hover:opacity-90">+ {t.add}</button>
      {selected.size>0&&<button onClick={()=>setBatchDel(true)} className="px-4 py-2.5 bg-rose-600 text-white rounded-xl text-sm font-medium">&#128465; ({selected.size})</button>}
    </div>
    <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 overflow-hidden shadow-sm">
      <div className="overflow-x-auto"><table className="w-full text-sm"><thead className="bg-gray-50 dark:bg-gray-800"><tr>
        <th className="w-10 px-4 py-3"><input type="checkbox" checked={rows.length>0&&selected.size===rows.length} onChange={()=>{if(selected.size===rows.length)setSelected(new Set());else setSelected(new Set(rows.map(r=>r._id)))}}/></th>
        {cols.map(c=><th key={c.id} className="text-left px-4 py-3 font-medium cursor-pointer select-none hover:bg-gray-100 dark:hover:bg-gray-700" onClick={()=>toggleSort(c.db_column)}><span className="flex items-center gap-1">{c.name}{c.validation_rule&&<span className="text-indigo-400 text-xs">&#9889;</span>}<span className={sortBy===c.db_column?'text-indigo-500':'text-gray-300'}>{sortDir==='asc'&&sortBy===c.db_column?'↑':'↓'}</span></span></th>)}
        <th className="w-24 px-4 py-3 text-right font-medium"></th>
      </tr></thead><tbody className="divide-y divide-gray-100 dark:divide-gray-800">
        {adding&&<tr className="bg-indigo-50/50 dark:bg-indigo-950/20"><td className="px-4 py-2"/>{cols.map(c=><td key={c.id} className="px-4 py-2">{renderInput(c)}</td>)}<td className="px-4 py-2 text-right"><button onClick={saveAdd} className="p-1.5 rounded-lg bg-emerald-600 text-white mr-1">✓</button><button onClick={cancel} className="p-1.5 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700">✕</button></td></tr>}
        {rows.map(row=><tr key={row._id} className={`hover:bg-gray-50 dark:hover:bg-gray-800/50 ${selected.has(row._id)?'bg-indigo-50/30 dark:bg-indigo-950/10':''}`}>
          <td className="px-4 py-2.5"><input type="checkbox" checked={selected.has(row._id)} onChange={()=>toggleSel(row._id)}/></td>
          {cols.map(c=><td key={c.id} className="px-4 py-2.5">{editId===row._id?renderInput(c):c.data_type==='boolean'?<span className={`px-2 py-0.5 rounded-full text-xs font-medium ${row[c.db_column]?'bg-emerald-100 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-400':'bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400'}`}>{row[c.db_column]?t.yes:t.no}</span>:<span className="truncate max-w-xs inline-block">{row[c.db_column]!=null?String(row[c.db_column]):'-'}</span>}</td>)}
          <td className="px-4 py-2.5 text-right">{editId===row._id?<span><button onClick={saveEdit} className="p-1.5 rounded-lg bg-emerald-600 text-white mr-1">✓</button><button onClick={cancel} className="p-1.5 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700">✕</button></span>:<span><button onClick={()=>startEdit(row)} className="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-400">&#9998;</button><button onClick={()=>setDelId(row._id)} className="p-1.5 rounded-lg hover:bg-rose-50 dark:hover:bg-rose-950 text-gray-400 hover:text-rose-600">&#128465;</button></span>}</td>
        </tr>)}
        {rows.length===0&&!adding&&<tr><td colSpan={cols.length+2} className="px-4 py-12 text-center text-gray-400">{search?t.noResults:t.noData}</td></tr>}
      </tbody></table></div>
      {data&&data.total_pages>1&&<div className="px-4 py-3 border-t border-gray-200 dark:border-gray-800 flex items-center justify-between text-sm"><span className="text-gray-500">{data.total.toLocaleString()} {t.record}</span><div className="flex items-center gap-2"><button onClick={()=>setPage(p=>p-1)} disabled={page<=1} className="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 disabled:opacity-30">&laquo;</button><span>{page}/{data.total_pages}</span><button onClick={()=>setPage(p=>p+1)} disabled={page>=data.total_pages} className="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 disabled:opacity-30">&raquo;</button></div></div>}
    </div>
    <Confirm open={delId!==null} title={t.deleteRecord} msg={t.deleteRecordMsg} danger onOk={handleDel} onCancel={()=>setDelId(null)}/>
    <Confirm open={batchDel} title={t.deleteRecords} msg={`${t.delete_} ${selected.size} ${t.record}?`} danger onOk={handleBatchDel} onCancel={()=>setBatchDel(false)}/>
  </div>
}

// ====== EDIT ======
function EditCrud({id,onNav}){
  const{t}=useI18n();const{add}=useToast();
  const[crud,setCrud]=useState(null);const[name,setName]=useState('');const[desc,setDesc]=useState('');const[color,setColor]=useState('#6366f1');
  const[newCol,setNewCol]=useState('');const[newType,setNewType]=useState('text');const[newRule,setNewRule]=useState('');const[newReq,setNewReq]=useState(false);const[newUniq,setNewUniq]=useState(false);const[delCol,setDelCol]=useState(null);
  const load=()=>api(`/cruds/${id}`).then(c=>{setCrud(c);setName(c.name);setDesc(c.description);setColor(c.color)}).catch(()=>add('error',t.errNotFound));
  useEffect(()=>{load()},[id]);
  const save=async()=>{try{await api(`/cruds/${id}`,{method:'PUT',body:JSON.stringify({name:name.trim(),description:desc.trim(),color})});add('success',t.tableUpdated);onNav('view',id)}catch(e){add('error',e.message)}};
  const addC=async()=>{if(!newCol.trim())return;try{await api(`/cruds/${id}/columns`,{method:'POST',body:JSON.stringify({name:newCol.trim(),data_type:newType,is_required:newReq,is_unique:newUniq,validation_rule:newRule})});add('success',`"${newCol}" ${t.colAdded}`);setNewCol('');setNewRule('');setNewReq(false);setNewUniq(false);load()}catch(e){add('error',e.message)}};

// ====== IMPORT ======
function ImportData({id,onNav}){
  const{t}=useI18n();const{add}=useToast();const fileRef=useRef();
  const[crud,setCrud]=useState(null);const[fileData,setFileData]=useState(null);const[mapping,setMapping]=useState({});
  const[busy,setBusy]=useState(false);const[validating,setValidating]=useState(false);const[step,setStep]=useState('upload');const[result,setResult]=useState(null);const[validation,setValidation]=useState(null);
  useEffect(()=>{api(`/cruds/${id}`).then(setCrud).catch(()=>add('error',t.errNotFound))},[id]);
  const processFile=file=>{const isCSV=file.name.match(/\.csv$/i);const isXLS=file.name.match(/\.xlsx?$/i);if(!isCSV&&!isXLS){add('error','xlsx/csv only');return}
    const reader=new FileReader();reader.onload=e=>{try{let headers,rows;if(isCSV){const p=parseCSV(e.target.result);headers=p.headers;rows=p.rows}else{const wb=XLSX.read(e.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const json=XLSX.utils.sheet_to_json(ws);if(!json.length){add('error','Empty');return}headers=Object.keys(json[0]);rows=json}if(!headers.length){add('error','No headers');return}setFileData({fileName:file.name,headers,rows,sample:rows.slice(0,5)});setStep('map');autoMap(headers)}catch{add('error','Read error')}};if(isCSV)reader.readAsText(file);else reader.readAsArrayBuffer(file)};
  const autoMap=hdrs=>{if(!crud)return;const m={};crud.columns.forEach(c=>{const cl=c.name.toLowerCase().replace(/\s+/g,'');const match=hdrs.find(h=>{const hl=h.toLowerCase().replace(/\s+/g,'');return hl===cl||hl.includes(cl)||cl.includes(hl)});if(match)m[c.db_column]=match});setMapping(m)};
  const doValidate=async()=>{setValidating(true);try{const model=localStorage.getItem('dbx-ai-model')||'';const res=await api(`/cruds/${id}/import/validate`,{method:'POST',body:JSON.stringify({mapping,rows:fileData.rows,model})});setValidation(res);setStep('validate')}catch(e){add('error',e.message)}finally{setValidating(false)}};
  const doImport=async(onlyValid)=>{const rowsI=onlyValid&&validation?fileData.rows.filter((_,i)=>validation.rows[i]?.valid):fileData.rows;setBusy(true);try{const r=await api(`/cruds/${id}/import`,{method:'POST',body:JSON.stringify({mapping,rows:rowsI})});setResult(r);setStep('done');add('success',r.message)}catch(e){add('error',e.message)}finally{setBusy(false)}};
  const mapped=Object.values(mapping).filter(Boolean).length;const reset=()=>{setStep('upload');setFileData(null);setMapping({});setResult(null);setValidation(null)};
  if(!crud)return<div className="flex items-center justify-center h-64"><div className="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"/></div>;
  const steps=[t.stUpload,t.stMap,t.stValidate,t.stImport];const stepsK=['upload','map','validate','done'];const idx=stepsK.indexOf(step);
  return <div className="max-w-4xl mx-auto animate-fade-in">
    <button onClick={()=>onNav('view',id)} className="flex items-center gap-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 mb-6 text-sm">&larr; {t.back} {crud.name}</button>
    <div className="flex items-center gap-4 mb-6"><div className="w-12 h-12 rounded-2xl flex items-center justify-center text-white font-bold" style={{backgroundColor:crud.color}}>{crud.name.substring(0,2).toUpperCase()}</div><div><h1 className="text-2xl font-bold">{t.importTitle}</h1><p className="text-gray-500 dark:text-gray-400 text-sm">{t.importSub} "{crud.name}"</p></div></div>
    <div className="flex items-center gap-2 mb-6">{steps.map((s,i)=><div key={s} className="flex items-center gap-2"><div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-medium ${i<=idx?'accent-bg text-white':'bg-gray-200 dark:bg-gray-700 text-gray-500'}`}>{i<idx?'✓':i+1}</div><span className="text-xs hidden sm:inline text-gray-500">{s}</span>{i<3&&<div className="w-6 h-px bg-gray-300 dark:bg-gray-700"/>}</div>)}</div>
    {step==='upload'&&<div onDragOver={e=>{e.preventDefault()}} onDrop={e=>{e.preventDefault();processFile(e.dataTransfer.files[0])}} className="border-2 border-dashed rounded-2xl p-12 text-center border-gray-300 dark:border-gray-700 hover:border-gray-400"><div className="text-6xl mb-4">&#128462;</div><h3 className="text-lg font-semibold mb-2">{t.dragFile}</h3><p className="text-gray-500 dark:text-gray-400 mb-6">{t.formats}</p><input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={e=>e.target.files[0]&&processFile(e.target.files[0])} className="hidden"/><button onClick={()=>fileRef.current.click()} className="px-5 py-2.5 accent-bg text-white rounded-xl font-medium hover:opacity-90">{t.selectFile}</button></div>}
    {step==='map'&&fileData&&<div className="space-y-6">
      <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-4 flex items-center justify-between"><div><strong>{fileData.fileName}</strong> — {fileData.rows.length.toLocaleString()} {t.lines}, {fileData.headers.length} {t.colNs}</div><button onClick={reset} className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-400">&#10005;</button></div>
      <div className="flex items-center justify-between"><h2 className="text-lg font-semibold">{t.colMapping}</h2><button onClick={()=>autoMap(fileData.headers)} className="px-3 py-1.5 text-sm font-medium accent-text hover:bg-indigo-50 dark:hover:bg-indigo-950/30 rounded-lg">{t.autoMap}</button></div>
      <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 overflow-hidden">
        <div className="grid grid-cols-12 px-6 py-3 bg-gray-50 dark:bg-gray-800 text-sm font-medium"><div className="col-span-5">{t.tableCol}</div><div className="col-span-2 text-center">&rarr;</div><div className="col-span-5">{t.fileCol}</div></div>
        <div className="divide-y divide-gray-100 dark:divide-gray-800">{crud.columns.map(c=><div key={c.id} className="grid grid-cols-12 items-center px-6 py-3 gap-2">
          <div className="col-span-5 flex items-center gap-2 flex-wrap"><div className="w-2 h-2 rounded-full" style={{backgroundColor:crud.color}}/><span className="font-medium text-sm">{c.name}</span><span className="text-xs text-gray-400 bg-gray-100 dark:bg-gray-800 px-1.5 py-0.5 rounded">{c.data_type}</span>{c.is_required&&<span className="text-xs text-rose-500">*</span>}{c.is_unique&&<span className="text-xs px-1 rounded bg-indigo-100 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400">UK</span>}</div>
          <div className="col-span-2 flex justify-center"><div className={`w-8 h-px ${mapping[c.db_column]?'bg-emerald-400':'bg-gray-300 dark:bg-gray-700'}`}/>{mapping[c.db_column]&&<span className="text-emerald-500 -ml-1">✓</span>}</div>
          <div className="col-span-5"><select value={mapping[c.db_column]||''} onChange={e=>setMapping({...mapping,[c.db_column]:e.target.value})} className={`w-full px-3 py-2 rounded-lg border text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 ${mapping[c.db_column]?'border-emerald-300 dark:border-emerald-700 bg-emerald-50 dark:bg-emerald-950/20':'border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800'}`}><option value="">{t.selectCol}</option>{fileData.headers.map(h=><option key={h} value={h}>{h}</option>)}</select></div>
        </div>)}</div></div>
      <div className="flex items-center justify-between"><div className="text-sm text-gray-500">{mapped===0&&<span className="text-amber-600">{t.mapHint}</span>}</div><button onClick={doValidate} disabled={mapped===0||validating} className="px-6 py-2.5 accent-bg text-white rounded-xl font-medium hover:opacity-90 disabled:opacity-50">{validating?t.validating:`${t.validate} ${fileData.rows.length.toLocaleString()} ${t.lines}`}</button></div>
    </div>}
    {step==='validate'&&validation&&<div className="space-y-6">
      <div className="grid grid-cols-3 gap-4">
        <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-4 text-center"><div className="text-2xl font-bold">{validation.total}</div><div className="text-sm text-gray-500">{t.total}</div></div>
        <div className="bg-emerald-50 dark:bg-emerald-950/30 rounded-2xl border border-emerald-200 dark:border-emerald-800 p-4 text-center"><div className="text-2xl font-bold text-emerald-600">{validation.valid}</div><div className="text-sm text-emerald-600">{t.valid}</div></div>
        <div className={`rounded-2xl border p-4 text-center ${validation.invalid>0?'bg-rose-50 dark:bg-rose-950/30 border-rose-200 dark:border-rose-800':'bg-gray-50 dark:bg-gray-800 border-gray-200 dark:border-gray-700'}`}><div className={`text-2xl font-bold ${validation.invalid>0?'text-rose-600':'text-gray-400'}`}>{validation.invalid}</div><div className={`text-sm ${validation.invalid>0?'text-rose-600':'text-gray-400'}`}>{t.invalid}</div></div>
      </div>
      <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 overflow-hidden"><div className="px-6 py-3 border-b border-gray-200 dark:border-gray-800"><h3 className="font-medium">{t.validationResult}</h3></div>
        <div className="overflow-x-auto max-h-96 overflow-y-auto"><table className="w-full text-sm"><thead className="bg-gray-50 dark:bg-gray-800 sticky top-0"><tr><th className="w-10 px-4 py-2 text-left">#</th><th className="w-10 px-4 py-2 text-center">{t.status}</th>{crud.columns.filter(c=>mapping[c.db_column]).map(c=><th key={c.id} className="text-left px-4 py-2 font-medium">{c.name}</th>)}<th className="text-left px-4 py-2 font-medium">{t.errors}</th></tr></thead>
          <tbody className="divide-y divide-gray-100 dark:divide-gray-800">{validation.rows.map((vr,i)=><tr key={i} className={vr.valid?'':'bg-rose-50/50 dark:bg-rose-950/10'}><td className="px-4 py-2 text-gray-400 text-xs">{vr.row}</td><td className="px-4 py-2 text-center">{vr.valid?<span className="text-emerald-500">&#10003;</span>:<span className="text-rose-500">&#10007;</span>}</td>{crud.columns.filter(c=>mapping[c.db_column]).map(c=><td key={c.id} className="px-4 py-2 text-xs truncate max-w-[150px]">{vr.preview?.[c.name]||'-'}</td>)}<td className="px-4 py-2">{vr.errors.length>0&&<div className="space-y-0.5">{vr.errors.map((e,j)=><div key={j} className="text-xs text-rose-600"><strong>{e.field}:</strong> {e.message}</div>)}</div>}</td></tr>)}</tbody></table></div></div>

    </div>}

// ====== SETTINGS ======

  const[theme,setTheme]=useState(localStorage.getItem('dbx-theme')||'light');

  const applyAccent=c=>{const h=c.replace('#','');const[r,g,b]=[parseInt(h.substring(0,2),16),parseInt(h.substring(2,4),16),parseInt(h.substring(4,6),16)];document.documentElement.style.setProperty('--accent',`${r} ${g} ${b}`);localStorage.setItem('dbx-accent',c);setAccent(c)};

    <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 mb-6">

        <p className="text-xs text-gray-400">{t.currentModel} <span className="font-mono accent-text">{aiModel||defaultModel}</span></p></div>}

    {/* Accent */}
    <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 mb-6">
      <h2 className="font-semibold text-lg mb-4">{t.accentColor}</h2>
      <div className="grid grid-cols-4 sm:grid-cols-6 gap-3">{ACCENTS.map(c=><button key={c.v} onClick={()=>applyAccent(c.v)} className={`flex flex-col items-center gap-2 p-3 rounded-xl ${accent===c.v?'ring-2 ring-offset-2 ring-gray-400 dark:ring-offset-gray-900 scale-105':'hover:bg-gray-50 dark:hover:bg-gray-800'}`}><div className="w-10 h-10 rounded-xl shadow-sm" style={{backgroundColor:c.v}}/><span className="text-xs text-gray-500 dark:text-gray-400">{c.n}</span></button>)}</div>
      <div className="mt-6 p-4 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/30"><h3 className="text-sm font-medium mb-3 text-gray-500">{t.preview}</h3><div className="flex items-center gap-3"><button className="px-4 py-2 accent-bg text-white rounded-xl text-sm font-medium">{t.primary}</button><button className="px-4 py-2 accent-bg-light accent-text rounded-xl text-sm font-medium">{t.secondary}</button><span className="accent-text text-sm font-medium">{t.link}</span></div></div>
    </div>

    {/* Tools */}
    <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
      <h2 className="font-semibold text-lg mb-1">&#128736; {t.toolLibrary}</h2>
      <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">{t.toolLibDesc}</p>
      {loadingTools?<div className="text-sm text-gray-400">...</div>:tools.length===0?<p className="text-sm text-gray-400 py-4 text-center">{t.toolEmpty}</p>:
      <div className="rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden"><table className="w-full text-sm"><thead className="bg-gray-50 dark:bg-gray-800"><tr><th className="text-left px-4 py-2 font-medium">{t.toolName}</th><th className="text-left px-4 py-2 font-medium">{t.ruleExample}</th><th className="text-left px-4 py-2 font-medium">{t.uses}</th><th className="text-left px-4 py-2 font-medium">{t.createdAt}</th></tr></thead>
        <tbody className="divide-y divide-gray-100 dark:divide-gray-800">{tools.map(tl=><tr key={tl.id}><td className="px-4 py-2"><span className="font-mono text-xs accent-text">{tl.tool_name}</span></td><td className="px-4 py-2 text-gray-600 dark:text-gray-400 text-xs">{tl.rule_example}</td><td className="px-4 py-2"><span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-indigo-100 dark:bg-indigo-950 text-indigo-700 dark:text-indigo-300">{tl.usage_count}x</span></td><td className="px-4 py-2 text-xs text-gray-400">{tl.created_at?new Date(tl.created_at).toLocaleDateString():'-'}</td></tr>)}</tbody></table></div>}
    </div>
  </div>
}

// ====== APP ======
function App(){
  const[page,setPage]=useState('home');const[pageId,setPageId]=useState(null);
  const onNav=(p,id=null)=>{setPage(p);setPageId(id);window.scrollTo(0,0)};
  useEffect(()=>{const tm=localStorage.getItem('dbx-theme')||'light';document.documentElement.classList.toggle('dark',tm==='dark');document.body.className=tm==='dark'?'bg-gray-950 text-gray-100':'bg-gray-50 text-gray-900';const a=localStorage.getItem('dbx-accent');if(a){const h=a.replace('#','');const[r,g,b]=[parseInt(h.substring(0,2),16),parseInt(h.substring(2,4),16),parseInt(h.substring(4,6),16)];document.documentElement.style.setProperty('--accent',`${r} ${g} ${b}`)}},[]);
  return <I18nProvider><ToastProvider><AppInner page={page} pageId={pageId} onNav={onNav}/></ToastProvider></I18nProvider>
}
function AppInner({page,pageId,onNav}){
  const{t}=useI18n();
  return <div className="flex h-screen overflow-hidden">
    <aside className="hidden lg:flex w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex-col shrink-0">
      <div className="h-16 flex items-center px-5 border-b border-gray-200 dark:border-gray-800"><span className="text-xl font-bold tracking-tight">&#128202; DBX <span className="accent-text">CRUDs</span></span></div>
      <nav className="flex-1 py-4 px-3 space-y-1">
        {[{p:'home',l:t.dashboard,i:'&#127968;'},{p:'create',l:t.newTable,i:'&#10133;'},{p:'settings',l:t.settings,i:'&#9881;'}].map(n=><button key={n.p} onClick={()=>onNav(n.p)} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors ${page===n.p?'accent-bg text-white shadow-md':'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800'}`}><span dangerouslySetInnerHTML={{__html:n.i}}/>{n.l}</button>)}
      </nav>
      <div className="p-4 border-t border-gray-200 dark:border-gray-800 text-xs text-gray-400">{t.powered}</div>
    </aside>
    <div className="flex-1 overflow-y-auto">
      <header className="h-14 flex items-center px-4 border-b border-gray-200 dark:border-gray-800 lg:hidden"><span className="font-semibold text-lg">&#128202; DBX CRUDs</span><div className="ml-auto flex gap-2"><button onClick={()=>onNav('home')} className="px-2 py-1 rounded text-sm hover:bg-gray-100 dark:hover:bg-gray-800">{t.dashboard}</button><button onClick={()=>onNav('create')} className="px-2 py-1 rounded text-sm hover:bg-gray-100 dark:hover:bg-gray-800">+</button><button onClick={()=>onNav('settings')} className="px-2 py-1 rounded text-sm hover:bg-gray-100 dark:hover:bg-gray-800">&#9881;</button></div></header>
      <main className="max-w-7xl mx-auto p-4 md:p-6 lg:p-8">
        {page==='home'&&<Dashboard onNav={onNav}/>}
        {page==='create'&&<CreateCrud onNav={onNav}/>}
        {page==='view'&&pageId&&<CrudView id={pageId} onNav={onNav}/>}
        {page==='edit'&&pageId&&<EditCrud id={pageId} onNav={onNav}/>}
        {page==='import'&&pageId&&<ImportData id={pageId} onNav={onNav}/>}
        {page==='settings'&&<Settings onNav={onNav}/>}
      </main>
    </div>
  </div>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
